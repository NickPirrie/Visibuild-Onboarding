<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visibuild Onboarding Portal</title>
<style>
:root{
  --ink:#10241f; --ink-soft:#42514c; --ink-faint:#6f7d78;
  --paper:#f6f4ee; --surface:#ffffff; --line:#e2ddd2; --line-soft:#ece8df;
  --vb:#1d9e75; --vb-dark:#0f6e56; --vb-soft:#e1f5ee;
  --blue:#185fa5; --blue-soft:#e6f1fb;
  --amber:#854f0b; --amber-soft:#faeeda; --amber-mid:#ba7517;
  --red:#a32d2d; --red-soft:#fcebeb;
  --grey:#5f5e5a; --grey-soft:#f1efe8;
  --rad:10px; --rad-sm:6px;
  --shadow:0 1px 2px rgba(16,36,31,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Inter','Helvetica Neue',Arial,sans-serif;
  background:var(--paper); color:var(--ink);
  font-size:14px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
  background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
  background-size:28px 28px;
  background-attachment:fixed;
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{max-width:1040px;margin:0 auto;padding:1.5rem 1.25rem 4rem}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;letter-spacing:-0.01em;font-size:15px}
.brand-mark{width:24px;height:24px;border-radius:6px;background:var(--vb);position:relative;flex-shrink:0}
.brand-mark::before{content:"";position:absolute;inset:6px;border:2px solid var(--surface);border-radius:2px}
.brand-tag{font-size:11px;color:var(--ink-faint);font-weight:400;letter-spacing:0.02em}

/* header card */
.header{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:1.4rem 1.6rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1.25rem;flex-wrap:wrap}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--vb-dark);margin-bottom:6px}
.proj-name{font-size:24px;font-weight:600;letter-spacing:-0.02em;line-height:1.15}
.proj-client{font-weight:400;color:var(--ink-faint)}
.proj-meta{display:flex;gap:18px;flex-wrap:wrap;margin-top:10px;font-size:12.5px;color:var(--ink-soft)}
.proj-meta span{display:inline-flex;align-items:center;gap:6px}
.proj-meta svg{width:14px;height:14px;stroke:var(--ink-faint);flex-shrink:0}

/* health dial */
.dial-box{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.dial{position:relative;width:96px;height:96px}
.dial svg{transform:rotate(-90deg)}
.dial-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dial-num b{font-size:26px;font-weight:600;letter-spacing:-0.02em;line-height:1}
.dial-num small{font-size:10px;color:var(--ink-faint)}
.dial-label{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px}

/* metrics */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1rem}
.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:0.95rem 1.1rem;box-shadow:var(--shadow)}
.metric .ml{font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:5px}
.metric .mv{font-size:24px;font-weight:600;letter-spacing:-0.02em}
.metric .mv small{font-size:14px;font-weight:400;color:var(--ink-faint)}

/* nav */
.nav{display:flex;gap:2px;background:var(--surface);border:1px solid var(--line);padding:4px;border-radius:var(--rad);margin-bottom:1rem;box-shadow:var(--shadow);overflow-x:auto}
.nav button{flex:1;min-width:90px;padding:8px 10px;border:none;background:transparent;color:var(--ink-faint);font-size:13px;font-weight:500;font-family:inherit;border-radius:var(--rad-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;transition:all .12s}
.nav button:hover{color:var(--ink)}
.nav button.active{background:var(--vb-soft);color:var(--vb-dark)}
.nav button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}

/* phase */
.phase{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);margin-bottom:0.85rem;overflow:hidden;box-shadow:var(--shadow)}
.phase-head{padding:0.95rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:12px}
.phase-head:hover{background:var(--paper)}
.phase-tl{display:flex;align-items:center;gap:10px;min-width:0}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.phase-name{font-weight:600;font-size:14.5px;letter-spacing:-0.01em}
.phase-sub{font-weight:400;color:var(--ink-faint);font-size:13px}
.pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;background:var(--grey-soft);color:var(--grey)}
.phase-tr{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pbar{width:90px;height:5px;border-radius:3px;background:var(--line);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:3px;transition:width .35s ease}
.pct{font-size:12px;color:var(--ink-soft);font-weight:600;min-width:34px;text-align:right}
.chev{width:16px;height:16px;stroke:var(--ink-faint);fill:none;stroke-width:2;transition:transform .2s}
.chev.up{transform:rotate(180deg)}

/* tasks */
.tlist{border-top:1px solid var(--line-soft)}
.trow{padding:0.7rem 1.25rem;border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:16px 14px 1fr auto auto;gap:12px;align-items:center}
.trow:last-child{border-bottom:none}
.tstatus-dot{width:10px;height:10px;border-radius:50%}
.tname{font-size:13.5px;line-height:1.35}
.tmeta{display:flex;gap:12px;margin-top:3px;flex-wrap:wrap}
.tmeta span{font-size:11px;color:var(--ink-faint);display:inline-flex;align-items:center;gap:4px}
.owner-tag{font-weight:600}
.owner-Visibuild{color:var(--blue)} .owner-Client{color:var(--vb-dark)} .owner-Shared{color:var(--grey)}
select,input,textarea{font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:var(--rad-sm);padding:6px 8px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--vb);box-shadow:0 0 0 3px var(--vb-soft)}
.sel-status{font-size:11px;font-weight:600;padding:4px 7px;border-radius:20px;border-width:1px;cursor:pointer}
.date-in{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;border:0;padding:0}
.date-badge{cursor:pointer}
.date-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.date-badge.overdue{background:#fcebeb;color:#a32d2d}
.date-badge.upcoming{background:#faeeda;color:#854f0b}
.date-badge.done-date{background:#e1f5ee;color:#0f6e56}
.tact{display:flex;gap:2px}
.ico{background:none;border:none;cursor:pointer;color:var(--ink-faint);padding:5px;border-radius:var(--rad-sm);display:flex;line-height:1}
.ico:hover{color:var(--ink);background:var(--paper)}
.ico svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.ico.has svg{stroke:var(--blue)}

/* comments */
.cpanel{margin:0 1.25rem .8rem;background:var(--paper);border:1px solid var(--line-soft);border-radius:var(--rad-sm);padding:0.8rem}
.citem{padding:6px 0;border-bottom:1px solid var(--line-soft);font-size:12.5px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.citem-main{flex:1;min-width:0}
.cact{flex-shrink:0;display:flex;gap:2px;opacity:0;transition:opacity .12s}
.citem:hover .cact{opacity:1}
.cact svg{width:14px;height:14px}
.cedit-row{display:flex;gap:6px;margin-top:4px}
.cedit-in{flex:1;font-size:12.5px;font-family:inherit;padding:5px 8px;border:1px solid var(--vb);border-radius:6px;box-shadow:0 0 0 3px var(--vb-soft)}
.cedit-save{flex-shrink:0}
.cdel svg{width:14px;height:14px}
.citem:last-of-type{border-bottom:none}
.cauthor{font-weight:600}
.cauthor.Client{color:var(--vb-dark)} .cauthor.Visibuild{color:var(--blue)}
.ctime{color:var(--ink-faint);font-size:11px;margin-left:6px}
.cbody{margin-top:2px;color:var(--ink-soft)}
.cinput{display:flex;gap:6px;margin-top:8px}
.cinput input{flex:1}
.cempty{color:var(--ink-faint);font-size:12.5px;margin-bottom:6px}

/* buttons */
.btn{padding:6px 12px;font-size:12.5px;font-weight:500;font-family:inherit;border:1px solid var(--line);border-radius:var(--rad-sm);background:var(--surface);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s}
.btn:hover{border-color:var(--ink-faint)}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.btn-vb{background:var(--vb);border-color:var(--vb);color:#fff}
.btn-vb:hover{background:var(--vb-dark);border-color:var(--vb-dark)}
.btn-danger{background:var(--red,#a32d2d);border-color:var(--red,#a32d2d);color:#fff}
.btn-danger:hover{filter:brightness(0.92)}
.modal-overlay{position:fixed;inset:0;background:rgba(16,36,31,0.38);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal-box{background:var(--surface,#fff);border:1px solid var(--line,#e2ddd2);border-radius:12px;padding:1.4rem 1.5rem;max-width:380px;width:100%;box-shadow:0 12px 40px rgba(16,36,31,0.18)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:6px}
.modal-body{font-size:13px;color:var(--ink-soft,#42514c);line-height:1.5;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.addrow{padding:0.65rem 1.25rem;display:flex;gap:8px;align-items:center;border-top:1px solid var(--line-soft);background:var(--paper)}
.addrow input{flex:1}

/* programme */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:1.4rem 1.5rem;box-shadow:var(--shadow)}
.ptitle{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
.axis{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-faint);margin-bottom:6px;padding-left:160px;font-variant-numeric:tabular-nums}
.grow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.glabel{width:150px;flex-shrink:0;font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gtrack{flex:1;height:24px;background:var(--grey-soft);border-radius:5px;position:relative;overflow:hidden}
.gbar{position:absolute;height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10.5px;font-weight:600}
.gdot{position:absolute;top:4px;width:16px;height:16px;border-radius:50%;border:3px solid var(--surface);transform:translateX(-50%)}
.gtoday{position:absolute;top:-2px;bottom:-2px;width:2px;background:var(--red);opacity:.55}
.legend{margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--ink-faint);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.legend i{display:inline-block;width:14px;height:2px;background:var(--red);opacity:.55}

/* log */
.logitem{padding:0.7rem 1.25rem;border-bottom:1px solid var(--line-soft);display:grid;grid-template-columns:120px 1fr;gap:12px;font-size:12.5px;align-items:start}
.logitem:last-child{border-bottom:none}
.logtime{color:var(--ink-faint);font-variant-numeric:tabular-nums}

/* setup */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:1rem}
.field label{display:block;font-size:10.5px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:5px}
.field input,.field select{width:100%}
.setup-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:1.4rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.prow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.prow-dates{flex-wrap:wrap}
.prow-dates input[type=date]{flex:0 0 130px;font-size:12px}
.empty{padding:2rem 1.5rem;color:var(--ink-faint);font-size:13px;text-align:center}

/* drag + edit */
.drag-handle{cursor:grab;color:var(--line);display:flex;align-items:center;touch-action:none}
.drag-handle:hover{color:var(--ink-faint)}
.drag-handle:active{cursor:grabbing}
.drag-handle svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.phase.dragging,.trow.dragging{opacity:0.4}
.phase.drag-over{outline:2px dashed var(--vb);outline-offset:-2px}
.tlist.drag-over-list{background:var(--vb-soft)}
.trow.drop-before{box-shadow:inset 0 2px 0 var(--vb)}
.trow.drop-after{box-shadow:inset 0 -2px 0 var(--vb)}
.phase.drop-before{box-shadow:0 -3px 0 var(--vb)}
.phase.drop-after{box-shadow:0 3px 0 var(--vb)}
.edit-in{font-size:13.5px;font-family:inherit;padding:3px 6px;border:1px solid var(--vb);border-radius:var(--rad-sm);width:100%;box-shadow:0 0 0 3px var(--vb-soft)}
.phase-name-in{font-size:14.5px;font-weight:600;padding:2px 6px;border:1px solid var(--vb);border-radius:var(--rad-sm);box-shadow:0 0 0 3px var(--vb-soft)}
.phase-sub-in{font-size:13px;padding:2px 6px;border:1px solid var(--vb);border-radius:var(--rad-sm);box-shadow:0 0 0 3px var(--vb-soft);max-width:160px}
.head-edit-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.head-edit-row input{font-family:inherit}
.name-in-big{font-size:22px;font-weight:600;letter-spacing:-0.02em;padding:2px 6px;border:1px solid var(--vb);border-radius:var(--rad-sm);box-shadow:0 0 0 3px var(--vb-soft)}
.editable{cursor:text;border-radius:3px;padding:0 2px;margin:0 -2px}
.editable:hover{background:var(--vb-soft)}
.proj-switch{font-family:inherit;font-size:12.5px;font-weight:500;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:var(--rad-sm);padding:7px 9px;max-width:200px;cursor:pointer}
.proj-switch:focus{outline:none;border-color:var(--vb);box-shadow:0 0 0 3px var(--vb-soft)}
.sync-pill{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;background:#f1efe8;color:#5f5e5a;letter-spacing:0.02em;white-space:nowrap}
.share-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.share-row input{flex:1;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--ink-soft)}
code{font-family:ui-monospace,Menlo,monospace;font-size:11.5px;background:var(--grey-soft);padding:1px 5px;border-radius:4px}
/* owner sub-headers + phase meta */
.owner-head{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1.25rem 0.3rem;border-bottom:1px solid var(--line-soft);background:var(--paper)}
.owner-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase}
.owner-chip svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.owner-count{font-size:11px;color:var(--ink-faint);font-weight:600;font-variant-numeric:tabular-nums}
.phase-dates{font-size:11px;color:var(--ink-faint);font-weight:500;padding:1px 7px;border:1px solid var(--line);border-radius:20px;white-space:nowrap}
.phase-hbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;font-variant-numeric:tabular-nums}
@media (max-width:680px){
  .trow{grid-template-columns:14px 1fr;gap:8px}
  .trow .sel-status,.trow .date-in,.trow .tact{grid-column:2;justify-self:start}
  .fgrid{grid-template-columns:1fr}
  .axis,.glabel{padding-left:0}
  .glabel{width:100px}
  .grow{flex-direction:column;align-items:stretch;gap:3px}
  .proj-name{font-size:20px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
:focus-visible{outline:2px solid var(--vb);outline-offset:2px}
/* dashboard */
.db-wrap{max-width:960px;margin:0 auto;padding:32px 24px}
.db-wrap h1{font-size:20px;font-weight:700;margin-bottom:4px}
.db-sub{font-size:13px;color:var(--ink-faint);margin-bottom:28px}
.db-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.db-toolbar span{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint)}
.db-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.db-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--rad);padding:18px;display:flex;flex-direction:column;gap:12px;transition:box-shadow .15s;cursor:pointer;text-decoration:none;color:inherit}
.db-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.db-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.db-card-title{font-size:14px;font-weight:700;line-height:1.3}
.db-card-client{font-size:12px;color:var(--ink-faint);margin-top:2px}
.db-hbadge{font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.db-progress{height:4px;background:var(--line-soft);border-radius:4px;overflow:hidden}
.db-fill{height:100%;border-radius:4px}
.db-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line-soft);font-size:11px;color:var(--ink-faint)}
.db-key{font-family:ui-monospace,Menlo,monospace;font-size:10px;background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:2px 6px;color:var(--ink-faint)}
.db-empty{text-align:center;padding:60px 20px;color:var(--ink-faint);font-size:13px}
.db-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.db-modal-bg.open{display:flex}
.db-modal{background:var(--surface);border-radius:var(--rad);padding:24px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.db-modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.db-field{margin-bottom:14px}
.db-field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
.db-field input{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);border:1px solid var(--line);border-radius:var(--rad-sm);padding:8px 10px}
.db-field input:focus{outline:none;border-color:var(--vb);box-shadow:0 0 0 3px var(--vb-soft)}
.db-field .hint{font-size:11px;color:var(--ink-faint);margin-top:4px}
.db-preview{font-family:ui-monospace,Menlo,monospace;font-size:11px;background:var(--paper);border:1px solid var(--line);border-radius:var(--rad-sm);padding:8px 10px;color:var(--ink-soft);margin-top:10px;word-break:break-all;display:none}
.db-modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
</style>

<body>
<div class="wrap">
  <div class="topbar">

async function initSync(){

function phaseCompletion(p){if(!p.tasks.length)return 1;return p.tasks.filter(t=>t.status==='done').length/p.tasks.length}
// how far through a phase we should be by today (0-1), based on its date range
function phaseExpected(p){
  if(!p.start||!p.end)return null;
  const s=new Date(p.start),e=new Date(p.end),now=new Date();
  if(now<=s)return 0;
  if(now>=e)return 1;
  return (now-s)/(e-s);
}
// has the work in this phase been touched at all?
function phaseStartedWork(p){return p.tasks.some(t=>t.status==='done'||t.status==='inprogress')}
// is the project's overall window still in the future (nothing due yet by date)?
function projectNotStarted(){
  const dated=state.phases.filter(p=>p.tasks.length&&p.start&&p.end);
  if(!dated.length)return false; // no dates -> treat as live
  return !dated.some(p=>phaseExpected(p)>0); // true only if every dated phase is still in the future
}
// phase health: actual vs expected. If no dates, fall back to raw completion.
function phaseHealth(p){
  const comp=phaseCompletion(p);
  const exp=phaseExpected(p);
  const blocked=p.tasks.some(t=>t.status==='blocked');
  let h;
  if(exp===null){h=comp*100}            // no dates: just completion
  else if(exp===0){                      // not due to start yet
    h=comp>0?100:0;                       // credit any early progress; otherwise 0 (not "done")
  }
  else{h=Math.min(1,comp/exp)*100}       // ahead/on = 100, behind scales down
  if(blocked)h=Math.min(h,55);           // a block caps the phase at "at risk"
  return Math.max(0,Math.min(100,Math.round(h)));
}
// overall health
function health(){
  const phases=state.phases.filter(p=>p.tasks.length);
  if(!phases.length)return 0;
  const totTasks=phases.reduce((a,p)=>a+p.tasks.length,0);
  const compPct=Math.round(phases.reduce((a,p)=>a+phaseCompletion(p)*p.tasks.length,0)/totTasks*100);
  // Before the project window has started, health = actual completion (so 0 done -> 0%, not a false 100%).
  if(projectNotStarted()) return compPct;
  // Once underway: weight phases that are active/overdue or that have had work done.
  const active=phases.filter(p=>{const e=phaseExpected(p);return e===null||e>0||phaseStartedWork(p)});
  const pool=active.length?active:phases;
  let wsum=0,hsum=0;
  pool.forEach(p=>{const w=p.tasks.length;wsum+=w;hsum+=phaseHealth(p)*w});
  return wsum?Math.round(hsum/wsum):0;
}

};

        <div class="eyebrow">Implementation programme</div>
        <div class="proj-name" id="projNameWrap">

          ${p.startDate?`<span>${svg(I.cal)} Construction start ${fdate(p.startDate)}</span>`:''}

          <svg width="96" height="96"><circle cx="48" cy="48" r="40" fill="none" stroke="#e2ddd2" stroke-width="8"/><circle cx="48" cy="48" r="40" fill="none" stroke="${hColor(h)}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}"/></svg>
          <div class="dial-num"><b style="color:${hColor(h)}">${h}%</b><small>overall</small></div>

  <div class="metrics">
    <div class="metric"><div class="ml">Tasks complete</div><div class="mv">${allTasks().filter(t=>t.status==='done').length}<small>/${allTasks().length}</small></div></div>
    <div class="metric"><div class="ml">In progress</div><div class="mv">${allTasks().filter(t=>t.status==='inprogress').length}</div></div>
    <div class="metric"><div class="ml">Blocked</div><div class="mv" style="color:${allTasks().filter(t=>t.status==='blocked').length?'#a32d2d':''}">${allTasks().filter(t=>t.status==='blocked').length}</div></div>

function taskRow(ph,t){
  const co=state.openC[t.id];
  const isEd=editing===t.id;
  return `<div class="trow" draggable="true" data-task="${t.id}" data-phase="${ph.id}"
      ondragstart="taskDragStart(event,'${ph.id}','${t.id}')" ondragend="dragEnd(event)"
      ondragover="taskDragOver(event,'${ph.id}','${t.id}')" ondrop="taskDrop(event,'${ph.id}','${t.id}')">
    <span class="drag-handle" title="Drag to reorder">${svg(I.grip)}</span>
    <span class="tstatus-dot" style="background:${ST[t.status].c}" title="${ST[t.status].l}"></span>
    <div>
      ${isEd
        ?`<input class="edit-in" id="edit_${t.id}" value="${esc(t.name)}" onblur="saveEdit('${ph.id}','${t.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){editing=null;render()}">`
        :`<div class="tname">${esc(t.name)}</div>`}
      <div class="tmeta">
        <span class="owner-tag owner-${t.owner}">${svg(I.user)}${t.owner}</span>
        ${dateBadge(t.due,t.status,t.id)}
        ${t.comments.length?`<span>${svg(I.msg)}${t.comments.length}</span>`:''}
      </div>
    </div>
    <select class="sel-status" style="background:${ST[t.status].bg};color:${ST[t.status].c};border-color:${ST[t.status].c}" onchange="setStatus('${ph.id}','${t.id}',this.value)">
      ${Object.entries(ST).map(([k,v])=>`<option value="${k}" ${t.status===k?'selected':''}>${v.l}</option>`).join('')}
    </select>
    <input type="date" id="di_${t.id}" class="date-in" value="${t.due||''}" onchange="setDue('${ph.id}','${t.id}',this.value)" aria-label="Due date">
    <div class="tact">
      <button class="ico" onclick="startEdit('${t.id}')" aria-label="Rename task">${svg(I.edit)}</button>
      <button class="ico ${t.comments.length?'has':''}" onclick="toggleC('${t.id}')" aria-label="Comments">${svg(I.msg)}</button>
      <button class="ico" onclick="delTask('${ph.id}','${t.id}')" aria-label="Delete">${svg(I.trash)}</button>
    </div>

const OWNER_ORDER=['Visibuild','Client','Shared'];
function ownerLabel(o,ph){
  if(o==='Client'){const c=state.project.client;return c?`Client · ${esc(c)}`:'Client'}
  return o;
}

function tasks(){
  return state.phases.map((ph,pi)=>{
    const prog=phaseProg(ph),open=state.open.includes(ph.id);
    // group rows by owner, preserving task order within each group
    const groups={};
    ph.tasks.forEach(t=>{(groups[t.owner]=groups[t.owner]||[]).push(t)});
    const presentOwners=OWNER_ORDER.filter(o=>groups[o]&&groups[o].length).concat(Object.keys(groups).filter(o=>!OWNER_ORDER.includes(o)));
    const rows=presentOwners.map(o=>{
      const head=`<div class="owner-head owner-head-${o}"><span class="owner-chip owner-${o}">${svg(I.user)}${ownerLabel(o,ph)}</span><span class="owner-count">${groups[o].filter(t=>t.status==='done').length}/${groups[o].length}</span></div>`;
      return head+groups[o].map(t=>taskRow(ph,t)).join('');
    }).join('');
    const pEd=editingPhase===ph.id;
    const pb=phaseBadge(ph);
    const dateLabel=(ph.start&&ph.end)?`${fdateShort(ph.start)} – ${fdateShort(ph.end)}`:'';
    return `<div class="phase" draggable="true" data-phaseblock="${ph.id}"
        onmousedown="phaseGrip=event.target.closest('.drag-handle')&&!event.target.closest('.tlist')&&!event.target.closest('.trow')"
        ondragstart="phaseDragStart(event,'${ph.id}')" ondragend="dragEnd(event)"
        ondragover="phaseDragOver(event,'${ph.id}')" ondrop="phaseDrop(event,'${ph.id}')">
      <div class="phase-head">
        <div class="phase-tl">
          <span class="drag-handle" title="Drag to reorder phase" draggable="false">${svg(I.grip)}</span>
          <span class="dot" style="background:${ph.color}"></span>
          ${pEd
            ?`<input class="phase-name-in" id="pn_${ph.id}" value="${esc(ph.name)}" onblur="savePhaseName('${ph.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){editingPhase=null;render()}">
              <input class="phase-sub-in" id="ps_${ph.id}" value="${esc(ph.sub)}" onblur="savePhaseSub('${ph.id}',this.value)" onkeydown="if(event.key==='Enter')this.blur()">`
            :`<span class="phase-name editable" onclick="startPhaseEdit('${ph.id}')">${esc(ph.name)}</span>
              <span class="phase-sub editable" onclick="startPhaseEdit('${ph.id}')">${esc(ph.sub)}</span>
              <button class="ico" onclick="startPhaseEdit('${ph.id}')" aria-label="Rename phase">${svg(I.edit)}</button>`}
          ${dateLabel?`<span class="phase-dates">${dateLabel}</span>`:''}
          <span class="pill">${ph.tasks.filter(t=>t.status==='done').length}/${ph.tasks.length}</span>
          <span class="phase-hbadge" style="background:${pb.bg};color:${pb.c}" title="${pb.title}">${pb.text}</span>
        </div>
        <div class="phase-tr" onclick="toggleP('${ph.id}')" style="cursor:pointer">
          <span class="pbar"><i style="width:${prog}%;background:${ph.color}"></i></span>
          <span class="pct">${prog}%</span>
          ${svg(I.chev,'chev'+(open?' up':''))}
        </div>
      </div>
      ${open?`<div class="tlist" data-list="${ph.id}" ondragover="listDragOver(event,'${ph.id}')" ondrop="listDrop(event,'${ph.id}')">${rows}<div class="addrow">
        <input id="an_${ph.id}" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask('${ph.id}')">
        <select id="ao_${ph.id}"><option>Visibuild</option><option>Client</option><option>Shared</option></select>
        <button class="btn btn-vb" onclick="addTask('${ph.id}')">${svg(I.plus)}Add</button>
      </div></div>`:''}
    </div>`;
  }).join('');
}

function comments(pid,t){
  return `<div class="cpanel">
    ${t.comments.length?t.comments.map((c,ci)=>{
      const isEd=editingComment===t.id+'#'+ci;
      return `<div class="citem">
        <div class="citem-main">
          <span class="cauthor ${c.author}">${esc(c.author)}</span><span class="ctime">${c.time}${c.edited?' · edited':''}</span>
          ${isEd
            ? `<div class="cedit-row"><input class="cedit-in" id="ce_${t.id}_${ci}" value="${esc(c.text)}" onkeydown="if(event.key==='Enter')saveComment('${pid}','${t.id}',${ci},this.value);if(event.key==='Escape'){editingComment=null;render()}"><button class="btn btn-vb cedit-save" onclick="saveComment('${pid}','${t.id}',${ci},document.getElementById('ce_${t.id}_${ci}').value)">Save</button></div>`
            : `<div class="cbody">${esc(c.text)}</div>`}
        </div>
        <div class="cact">
          <button class="ico" onclick="startCommentEdit('${t.id}',${ci})" aria-label="Edit comment">${svg(I.edit)}</button>
          <button class="ico cdel" onclick="delComment('${pid}','${t.id}',${ci})" aria-label="Delete comment">${svg(I.trash)}</button>
        </div>
      </div>`;
    }).join(''):'<div class="cempty">No comments or queries yet.</div>'}
    <div class="cinput">
      <select id="ca_${t.id}"><option>Visibuild</option><option>Client</option></select>
      <input id="ct_${t.id}" placeholder="Add a comment or query…" onkeydown="if(event.key==='Enter')addComment('${pid}','${t.id}')">
      <button class="btn" onclick="addComment('${pid}','${t.id}')">Post</button>
    </div></div>`;
}

function programme(){
  // Determine timeline bounds from phase dates if present, else from project start + 90 days
  const phasesWithDates=state.phases.filter(p=>p.start&&p.end);
  let start,end;
  if(phasesWithDates.length){
    start=new Date(Math.min(...phasesWithDates.map(p=>+new Date(p.start))));
    end=new Date(Math.max(...phasesWithDates.map(p=>+new Date(p.end))));
  }else if(state.project.startDate){
    start=new Date(state.project.startDate);end=new Date(start);end.setDate(end.getDate()+90);
  }else{
    return `<div class="panel"><div class="empty">Add phase dates (or a construction start date) in <b>Setup</b> to generate the programme.</div></div>`;
  }
  const span=Math.max(1,(end-start)/864e5);
  const today=new Date();
  const tOff=Math.max(0,Math.min(100,(today-start)/864e5/span*100));
  const pos=d=>Math.max(0,Math.min(100,(new Date(d)-start)/864e5/span*100));
  // axis: 4 evenly spaced labels
  const axis=[0,1,2,3].map(i=>{const d=new Date(start);d.setDate(d.getDate()+Math.round(span*i/3));return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})});

  const phaseBars=state.phases.map(ph=>{
    const pr=phaseProg(ph),pb=phaseBadge(ph);
    let left=0,width=100/state.phases.length,hasDates=ph.start&&ph.end;
    if(hasDates){left=pos(ph.start);width=Math.max(3,pos(ph.end)-pos(ph.start))}
    else{const idx=state.phases.indexOf(ph);left=idx*(100/state.phases.length)}
    return `<div class="grow"><div class="glabel" title="${esc(ph.name)} · ${esc(ph.sub)}">${esc(ph.name)} · ${esc(ph.sub)}</div>
      <div class="gtrack"><div class="gbar" style="left:${left}%;width:${width}%;background:${ph.color}1f;border:1px solid ${ph.color}66;color:${ph.color}">${pr}%${hasDates?'':' (no dates)'}</div>
      <div class="gtoday" style="left:${tOff}%"></div></div>
      <span class="phase-hbadge" style="background:${pb.bg};color:${pb.c};margin-left:6px">${pb.text}</span></div>`;
  }).join('');

  const dated=state.phases.flatMap(ph=>ph.tasks.filter(t=>t.due).map(t=>({n:t.name,c:ph.color,st:t.status,o:pos(t.due)}))).slice(0,14);

  return `<div class="panel">
    <div class="ptitle">Programme timeline</div>
    <div class="axis">${axis.map(m=>`<span>${m}</span>`).join('')}</div>
    ${phaseBars}
    ${dated.length?`<div class="ptitle" style="margin:18px 0 12px">Task due dates</div>${dated.map(t=>`<div class="grow"><div class="glabel" title="${esc(t.n)}">${esc(t.n)}</div><div class="gtrack"><div class="gdot" style="left:${t.o}%;background:${t.c}" title="${ST[t.st].l}"></div><div class="gtoday" style="left:${tOff}%"></div></div></div>`).join('')}`:''}
    <div class="legend"><i></i> Today — ${today.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}. The % badge on each phase is its health: actual progress vs where it should be by today. Set phase dates in Setup.</div>
  </div>`;
}

function logV(){
  if(!state.log.length)return `<div class="panel"><div class="empty">No activity yet. Status changes, comments and edits are recorded here for traceability.</div></div>`;
  return `<div class="panel" style="padding:0">${state.log.map(l=>`<div class="logitem"><span class="logtime">${l.t}</span><span>${esc(l.m)}</span></div>`).join('')}</div>`;
}

function setup(){
  const p=state.project;
  const f=(k,lab,ph,type='text')=>`<div class="field"><label>${lab}</label><input type="${type}" value="${esc(p[k])}" placeholder="${ph}" oninput="setProj('${k}',this.value)"></div>`;
  return `<div class="setup-block">
    <div class="ptitle">Project details</div>
    <div class="fgrid">
      ${f('name','Project name','e.g. 99 City Road')}
      ${f('client','Client','e.g. Multiplex')}
      ${f('building','Building description','e.g. 36-level mixed-use')}
      <div class="field"><label>Construction start</label><input type="date" value="${p.startDate||''}" oninput="setProj('startDate',this.value)"></div>
      ${f('contact','Visibuild contact','Name')}
      ${f('email','Contact email','name@visibuild.com','email')}
    </div>
    <button class="btn btn-vb" onclick="exportTxt()">${svg(I.dl)}Export summary</button>
  </div>
  <div class="setup-block">
    <div class="ptitle">Phases & dates</div>
    <p style="font-size:12px;color:var(--ink-faint);margin-bottom:12px">Set each phase's date range. The health score uses these to judge whether a phase is on track for today's date — not just raw task completion.</p>
    ${state.phases.map(ph=>`<div class="prow prow-dates"><span class="dot" style="background:${ph.color}"></span>
      <input value="${esc(ph.name)}" style="flex:0 0 110px" oninput="setPhase('${ph.id}','name',this.value)" aria-label="Phase name">
      <input value="${esc(ph.sub)}" style="flex:1;min-width:90px" oninput="setPhase('${ph.id}','sub',this.value)" aria-label="Phase subtitle">
      <input type="date" value="${ph.start||''}" oninput="setPhase('${ph.id}','start',this.value)" aria-label="Phase start" title="Start">
      <input type="date" value="${ph.end||''}" oninput="setPhase('${ph.id}','end',this.value)" aria-label="Phase end" title="End">
    </div>`).join('')}
  </div>
  <div class="setup-block">
    <div class="ptitle">Data backup</div>
    <p style="font-size:13px;color:var(--ink-soft);line-height:1.6">Your projects, tasks and comments are stored in this browser. <b>Before opening a new version of this file</b>, export a backup here — then import it into the new file to restore everything exactly. This protects your data across updates.</p>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <button class="btn btn-vb" onclick="exportData()">${svg(I.dl)}Export data (backup)</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">${svg(I.dl)}Import data (restore)</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(event)">
    </div>
    <p style="font-size:11.5px;color:var(--ink-faint);margin-top:8px">Exports all projects as a .json file. Importing replaces everything currently in this browser with the backup's contents.</p>
  </div>
  <div class="setup-block">
    <div class="ptitle">Saving & sharing</div>
    ${SYNC?`
      <p style="font-size:13px;color:var(--ink-soft);line-height:1.6">This project is <b>live-synced</b> via Supabase. Anyone who opens the link below sees and edits the same data, with changes appearing in real time. Send it to your team and the client.</p>
      <div class="share-row">
        <input id="shareLink" readonly value="${esc(location.origin+location.pathname+'?p='+PROJECT_KEY)}">
        <button class="btn btn-vb" onclick="copyShare(event)">${svg(I.dl)}Copy link</button>
      </div>
      <p style="font-size:11.5px;color:var(--ink-faint);margin-top:8px">Project key: <code>${esc(PROJECT_KEY)}</code>. To start another client, open the same page with a different <code>?p=</code> key (e.g. <code>?p=skanska-tower</code>).</p>
    `:`
      <p style="font-size:13px;color:var(--ink-soft);line-height:1.6">Running in <b>local-only</b> mode — data saves to this browser and the dropdown holds multiple projects, but nothing syncs between people. To turn on live shared access: add your Supabase keys near the top of the HTML file and open it with <code>?p=clientname</code> on the end of the URL. Full steps are in the setup guide.</p>
    `}
    <button class="btn" style="margin-top:12px" onclick="exportTxt()">${svg(I.dl)}Export summary (text)</button>
  </div>`;
}

window.go=t=>{tab=t;render()};
window.toggleP=id=>{const i=state.open.indexOf(id);i>=0?state.open.splice(i,1):state.open.push(id);persist();render()};
window.toggleC=id=>{state.openC[id]=!state.openC[id];persist();render()};
window.setStatus=(p,id,v)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);logIt(`Status · "${t.name}" → ${ST[v].l}`);t.status=v;persist();render()};
window.setDue=(p,id,v)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);t.due=v;logIt(`Due date · "${t.name}" → ${fdate(v)||'cleared'}`);persist();render()};
window.addTask=p=>{const n=document.getElementById('an_'+p),o=document.getElementById('ao_'+p);if(!n.value.trim())return;const ph=state.phases.find(x=>x.id===p);const t={id:uid(),name:n.value.trim(),owner:o.value,status:'not-started',due:'',comments:[]};ph.tasks.push(t);logIt(`Task added · "${t.name}" (${t.owner})`);persist();render()};
window.delTask=(p,id)=>{const ph=state.phases.find(x=>x.id===p),t=ph.tasks.find(x=>x.id===id);showConfirm(`Delete "${t.name}"?`,'This removes the task and its comments.','Delete',()=>{logIt(`Task deleted · "${t.name}"`);ph.tasks=ph.tasks.filter(x=>x.id!==id);persist();render()})};
window.addComment=(p,id)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);const inp=document.getElementById('ct_'+id),a=document.getElementById('ca_'+id);if(!inp.value.trim())return;t.comments.push({author:a.value,text:inp.value.trim(),time:now()});logIt(`Comment by ${a.value} · "${t.name}"`);persist();render();const ni=document.getElementById('ct_'+id);if(ni)ni.focus()};
window.setProj=(k,v)=>{state.project[k]=v;persist();if(['name','client','startDate','building','contact','email'].includes(k)){clearTimeout(window._rt);window._rt=setTimeout(render,400)}};
window.setPhase=(id,k,v)=>{state.phases.find(x=>x.id===id)[k]=v;persist();if(k==='start'||k==='end'){clearTimeout(window._pt);window._pt=setTimeout(render,300)}};

window.delComment=(p,id,ci)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);if(!t.comments[ci])return;showConfirm('Delete this comment?','This removes the comment permanently.','Delete',()=>{t.comments.splice(ci,1);logIt(`Comment deleted · "${t.name}"`);editingComment=null;persist();render()})};
window.startCommentEdit=(id,ci)=>{editingComment=id+'#'+ci;render();const el=document.getElementById('ce_'+id+'_'+ci);if(el){el.focus();el.select()}};
window.saveComment=(p,id,ci,v)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);const c=t.comments[ci];if(!c)return;const nv=(v||'').trim();if(nv&&nv!==c.text){c.text=nv;c.edited=true;logIt(`Comment edited · "${t.name}"`)}editingComment=null;persist();render()};

function projName(s){return s.project.name||'Untitled project'}
function refreshProjSwitch(){
  const sel=document.getElementById('projSwitch');
  if(!sel)return;
  sel.innerHTML=store.order.map(id=>{const s=store.projects[id];return `<option value="${id}" ${id===store.current?'selected':''}>${esc(projName(s))}${s.project.client?' — '+esc(s.project.client):''}</option>`}).join('');
}
window.switchProject=id=>{if(!store.projects[id])return;store.current=id;state=load();tab='tasks';editing=null;editingPhase=null;try{localStorage.setItem(STORE,JSON.stringify(store))}catch{}render()};
window.newProject=()=>{const p=freshProject(blank);store.projects[p._id]=p;store.order.push(p._id);store.current=p._id;state=p;tab='tasks';persist();render()};
function addProjectFrom(seed){const p=freshProject(seed);store.projects[p._id]=p;store.order.push(p._id);store.current=p._id;state=p;tab='tasks';persist();render()}
window.load99=()=>addProjectFrom(demo99);
window.loadVista=()=>addProjectFrom(demoVista);
window.deleteProject=()=>{
  const only=store.order.length<=1;
  showConfirm(
    only?'Reset this project?':`Delete "${projName(state)}"?`,
    only?'This is your only project, so it will be reset to a blank template.':'This permanently removes the project and its tasks, dates and comments.',
    only?'Reset':'Delete',
    ()=>{
      if(only){
        const p=freshProject(blank);store.projects={[p._id]:p};store.order=[p._id];store.current=p._id;state=p;
      }else{
        delete store.projects[store.current];
        store.order=store.order.filter(x=>x!==store.current);
        store.current=store.order[0];
        state=load();
      }
      tab='tasks';try{localStorage.setItem(STORE,JSON.stringify(store))}catch{}render();
    }
  );
};
// lightweight in-page confirm (works even when native dialogs are blocked)
function showConfirm(title,body,okLabel,onOk){
  const old=document.getElementById('vbModal');if(old)old.remove();
  const o=document.createElement('div');o.id='vbModal';o.className='modal-overlay';
  o.innerHTML=`<div class="modal-box" role="dialog" aria-modal="true">
    <div class="modal-title">${esc(title)}</div>
    <div class="modal-body">${esc(body)}</div>
    <div class="modal-actions">
      <button class="btn" id="vbCancel">Cancel</button>
      <button class="btn btn-danger" id="vbOk">${esc(okLabel)}</button>
    </div></div>`;
  document.body.appendChild(o);
  const close=()=>o.remove();
  o.addEventListener('click',e=>{if(e.target===o)close()});
  document.getElementById('vbCancel').addEventListener('click',close);
  document.getElementById('vbOk').addEventListener('click',()=>{close();onOk()});
}

window.exportTxt=()=>{const p=state.project,h=health();let x=`VISIBUILD ONBOARDING SUMMARY\n${'='.repeat(40)}\nProject: ${p.name}\nClient: ${p.client}\nHealth score: ${h}% — ${hLabel(h)}\nExported: ${new Date().toLocaleString('en-GB')}\n\n`;state.phases.forEach(ph=>{x+=`${ph.name} — ${ph.sub} (${phaseProg(ph)}% complete)\n`;ph.tasks.forEach(t=>{x+=`  [${ST[t.status].l}] ${t.name} · ${t.owner}${t.due?' · due '+fdate(t.due):''}\n`});x+='\n'});const a=document.createElement('a');a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(x);a.download=`visibuild-onboarding-${(p.name||'project').replace(/\s+/g,'-').toLowerCase()}.txt`;a.click()};
window.exportData=()=>{
  persist();
  const payload={app:'visibuild-onboarding-portal',version:1,exported:new Date().toISOString(),store};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`visibuild-portal-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000);
};
window.importData=(ev)=>{
  const file=ev.target.files&&ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    let data;
    try{data=JSON.parse(reader.result)}catch{showConfirm('Import failed','That file could not be read as a valid backup.','OK',()=>{});ev.target.value='';return}
    const incoming=data&&data.store&&data.store.projects?data.store:(data&&data.projects?data:null);
    if(!incoming||!incoming.projects||!incoming.current){showConfirm('Import failed','That file does not look like a portal backup.','OK',()=>{});ev.target.value='';return}
    const n=Object.keys(incoming.projects).length;
    showConfirm('Restore this backup?',`This replaces everything currently in this browser with the backup (${n} project${n===1?'':'s'}). Your current data will be overwritten.`,'Restore',()=>{
      store=incoming;
      if(!store.order)store.order=Object.keys(store.projects);
      if(!store.projects[store.current])store.current=store.order[0];
      state=load();tab='tasks';editing=null;editingPhase=null;editingComment=null;
      try{localStorage.setItem(STORE,JSON.stringify(store))}catch{}
      render();
    });
    ev.target.value='';
  };
  reader.readAsText(file);
};

window.saveEdit=(p,id,v)=>{const t=state.phases.find(x=>x.id===p).tasks.find(x=>x.id===id);const nv=v.trim();if(nv&&nv!==t.name){logIt(`Renamed · "${t.name}" → "${nv}"`);t.name=nv}editing=null;persist();render()};
window.startPhaseEdit=id=>{editingPhase=id;render();const el=document.getElementById('pn_'+id);if(el){el.focus();el.select()}};
window.savePhaseName=(id,v)=>{const ph=state.phases.find(x=>x.id===id);const nv=v.trim();if(nv&&nv!==ph.name){logIt(`Phase renamed · "${ph.name}" → "${nv}"`);ph.name=nv}editingPhase=null;persist();render()};

function clearDropMarks(){document.querySelectorAll('.drop-before,.drop-after,.drag-over,.drag-over-list').forEach(el=>el.classList.remove('drop-before','drop-after','drag-over','drag-over-list'))}
window.dragEnd=e=>{dragTask=null;dragPhase=null;document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));clearDropMarks()};

window.taskDragStart=(e,pid,tid)=>{
  if(editingPhase||editing){e.preventDefault();return}
  dragTask={pid,tid};dragPhase=null;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
  e.stopPropagation();
};
window.taskDragOver=(e,pid,tid)=>{
  if(!dragTask)return;
  e.preventDefault();e.stopPropagation();
  const row=e.currentTarget;clearDropMarks();
  const r=row.getBoundingClientRect();
  const after=e.clientY>r.top+r.height/2;
  row.classList.add(after?'drop-after':'drop-before');
};
window.taskDrop=(e,pid,tid)=>{
  if(!dragTask)return;
  e.preventDefault();e.stopPropagation();
  const row=e.currentTarget;const r=row.getBoundingClientRect();
  const after=e.clientY>r.top+r.height/2;
  moveTask(dragTask.pid,dragTask.tid,pid,tid,after);
  dragEnd(e);
};
window.listDragOver=(e,pid)=>{if(!dragTask)return;e.preventDefault();const ph=state.phases.find(x=>x.id===pid);if(ph.tasks.length===0)e.currentTarget.classList.add('drag-over-list')};
window.listDrop=(e,pid)=>{
  if(!dragTask)return;
  const ph=state.phases.find(x=>x.id===pid);
  if(ph.tasks.length===0){e.preventDefault();moveTask(dragTask.pid,dragTask.tid,pid,null,true);dragEnd(e)}
};
function moveTask(fromP,tid,toP,beforeTid,after){
  const fp=state.phases.find(x=>x.id===fromP);
  const idx=fp.tasks.findIndex(t=>t.id===tid);
  const[task]=fp.tasks.splice(idx,1);
  const tp=state.phases.find(x=>x.id===toP);
  if(beforeTid==null){tp.tasks.push(task)}
  else{let j=tp.tasks.findIndex(t=>t.id===beforeTid);if(j<0)j=tp.tasks.length;tp.tasks.splice(after?j+1:j,0,task)}
  if(fromP!==toP)logIt(`Moved · "${task.name}" → ${tp.name}`);
  persist();render();
}

window.phaseGrip=false;
window.phaseDragStart=(e,pid)=>{
  if(dragTask)return;
  if(!window.phaseGrip){e.preventDefault();return}
  dragPhase=pid;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
};
window.phaseDragOver=(e,pid)=>{
  if(!dragPhase||dragPhase===pid)return;
  e.preventDefault();
  const block=e.currentTarget;clearDropMarks();
  const r=block.getBoundingClientRect();
  block.classList.add(e.clientY>r.top+r.height/2?'drop-after':'drop-before');
};
window.phaseDrop=(e,pid)=>{
  if(!dragPhase||dragPhase===pid)return;
  e.preventDefault();
  const block=e.currentTarget;const r=block.getBoundingClientRect();
  const after=e.clientY>r.top+r.height/2;
  const fi=state.phases.findIndex(p=>p.id===dragPhase);
  const[ph]=state.phases.splice(fi,1);
  let ti=state.phases.findIndex(p=>p.id===pid);
  state.phases.splice(after?ti+1:ti,0,ph);
  logIt(`Phase reordered · "${ph.name}"`);
  persist();render();dragEnd(e);
};

window.copyShare=(ev)=>{
  const el=document.getElementById('shareLink');if(!el)return;
  el.select();
  try{navigator.clipboard.writeText(el.value)}catch{try{document.execCommand('copy')}catch{}}
  const b=ev&&ev.target&&ev.target.closest('button');
  if(b){const o=b.innerHTML;b.textContent='Copied ✓';setTimeout(()=>b.innerHTML=o,1400)}
};

// In sync mode each link is one shared project — hide local multi-project controls
if(SYNC){
  ['projSwitch','btnNew','btnDemo99','btnDemoVista','btnReset'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none'});

// ── DASHBOARD ────────────────────────────────────────────────────────────────
const IS_DASHBOARD = window.location.search.includes('dashboard');
const BASE_PORTAL  = window.location.origin + window.location.pathname;

if(IS_DASHBOARD){
  document.querySelector('.wrap').style.display='none';
  const dbRoot = document.createElement('div');
  document.body.appendChild(dbRoot);
  dbRoot.innerHTML = `
  <div class="wrap" style="display:block">
    <div class="topbar">
      <div class="brand"><span class="brand-mark"></span> Visibuild <span class="brand-tag">Portal Dashboard</span></div>
      <button class="btn btn-vb" onclick="dbOpenModal()">+ New portal</button>
    </div>
  </div>
  <div class="db-wrap">
    <h1>Client Portals</h1>
    <p class="db-sub">All live synced portals. Click a card to open.</p>
    <div class="db-toolbar">
      <span id="dbCount">Loading…</span>
      <button class="btn" onclick="dbLoad()">↻ Refresh</button>
    </div>
    <div class="db-cards" id="dbCards"><div class="db-empty">Loading…</div></div>
  </div>
  <div class="db-modal-bg" id="dbModal" onclick="if(event.target===this)dbCloseModal()">
    <div class="db-modal">
      <h3>New client portal</h3>
      <div class="db-field"><label>Seed from template</label><select id="dbTemplate" onchange="dbPickTemplate()" style="width:100%;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--rad-sm);background:var(--surface);color:var(--ink)"><option value="">Blank</option><option value="vista">Project Vista (Multiplex)</option><option value="99">99 City Road (Multiplex)</option></select></div>
      <div class="db-field"><label>Client name</label><input type="text" id="dbClient" placeholder="e.g. Multiplex" oninput="dbUpdatePreview()"></div>
      <div class="db-field"><label>Project name</label><input type="text" id="dbProject" placeholder="e.g. Vista" oninput="dbUpdatePreview()"></div>
      <div class="db-field"><label>Portal key</label><input type="text" id="dbKey" placeholder="e.g. multiplex-vista" oninput="dbKeyManual=true;dbUpdatePreview()"><div class="hint">Lowercase, hyphens only.</div></div>
      <div class="db-preview" id="dbPreview"></div>
      <div class="db-modal-actions">
        <button class="btn" onclick="dbCloseModal()">Cancel</button>
        <button class="btn btn-vb" onclick="dbOpenPortal()">Create &amp; open →</button>
      </div>
    </div>
  </div>`;

  let dbKeyManual=false;
  function dbHColor(h){if(h==null)return{bg:'#f1efe8',c:'#5f5e5a'};if(h>=75)return{bg:'#e1f5ee',c:'#0f6e56'};if(h>=40)return{bg:'#faeeda',c:'#854f0b'};return{bg:'#fcebeb',c:'#a32d2d'}}
  function dbAgo(ts){if(!ts)return'—';const d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000);if(m<1)return'Just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
  function dbEsc(s){return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  async function dbLoad(){
    document.getElementById('dbCards').innerHTML='<div class="db-empty">Loading…</div>';
    try{
      const sb2=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
      const{data,error}=await sb2.from('portals').select('key,data,updated_at').order('updated_at',{ascending:false});
      if(error)throw error;
      const rows=data||[];
      document.getElementById('dbCount').textContent=rows.length?rows.length+' portal'+(rows.length===1?'':'s'):'No portals yet';
      if(!rows.length){document.getElementById('dbCards').innerHTML='<div class="db-empty">No portals yet. Click "+ New portal" to create one.</div>';return;}
      document.getElementById('dbCards').innerHTML=rows.map(r=>{
        const d=r.data||{},p=d.project||{};
        const name=p.name||r.key,client=p.client||'—';
        const h=d.health!=null?Math.round(d.health):null;
        const hc=dbHColor(h);
        let tot=0,done=0;(d.phases||[]).forEach(ph=>(ph.tasks||[]).forEach(t=>{tot++;if(t.status==='done')done++}));
        const pct=tot?Math.round(done/tot*100):0;
        const fc=pct>=75?'#1d9e75':pct>=40?'#f59e0b':'#dc2626';
        const url=BASE_PORTAL+'?p='+encodeURIComponent(r.key);
        return `<div class="db-card">
          <a href="${url}" target="_blank" style="text-decoration:none;color:inherit;display:contents">
            <div class="db-card-head"><div><div class="db-card-title">${dbEsc(name)}</div><div class="db-card-client">${dbEsc(client)}</div></div>${h!=null?`<span class="db-hbadge" style="background:${hc.bg};color:${hc.c}">${h}%</span>`:''}</div>
            <div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-bottom:5px"><span>Tasks</span><span>${done}/${tot} done</span></div><div class="db-progress"><div class="db-fill" style="width:${pct}%;background:${fc}"></div></div></div>
          </a>
          <div class="db-footer">
            <span class="db-key">${dbEsc(r.key)}</span>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:11px;color:var(--ink-faint)">Updated ${dbAgo(r.updated_at)}</span>
              <button onclick="dbDelete('${dbEsc(r.key)}','${dbEsc(name)}')" style="background:none;border:none;cursor:pointer;color:var(--ink-faint);font-size:11px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:3px" onmouseover="this.style.color='#a32d2d'" onmouseout="this.style.color='var(--ink-faint)'">✕ Delete</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }catch(e){document.getElementById('dbCards').innerHTML=`<div class="db-empty">Could not load portals.<br><small>${e.message}</small></div>`;}
  }
  window.dbOpenModal=()=>{document.getElementById('dbModal').classList.add('open');dbKeyManual=false;document.getElementById('dbTemplate').value='';document.getElementById('dbClient').value='';document.getElementById('dbProject').value='';document.getElementById('dbKey').value='';document.getElementById('dbPreview').style.display='none';}
  window.dbCloseModal=()=>document.getElementById('dbModal').classList.remove('open');
  window.dbPickTemplate=()=>{
    const t=document.getElementById('dbTemplate').value;
    if(t==='vista'){document.getElementById('dbClient').value='Multiplex';document.getElementById('dbProject').value='Project Vista';}
    else if(t==='99'){document.getElementById('dbClient').value='Multiplex';document.getElementById('dbProject').value='99 City Road';}
    dbKeyManual=false;dbUpdatePreview();
  }
  window.dbUpdatePreview=()=>{
    const c=document.getElementById('dbClient').value.trim(),p=document.getElementById('dbProject').value.trim();
    const kEl=document.getElementById('dbKey');
    if(!dbKeyManual&&(c||p))kEl.value=(c+'-'+p).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    const k=kEl.value.trim(),prev=document.getElementById('dbPreview');
    if(k){prev.style.display='block';prev.textContent=BASE_PORTAL+'?p='+k;}else{prev.style.display='none';}
  }
  window.dbDelete=async(key,name)=>{
    if(!confirm(`Delete "${name}" (${key})?\n\nThis permanently removes all data for this portal. This cannot be undone.`))return;
    try{
      const sb2=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
      const{error}=await sb2.from('portals').delete().eq('key',key);
      if(error)throw error;
      dbLoad();
    }catch(e){alert('Delete failed: '+e.message);}
  };
  window.dbOpenPortal=async()=>{
    const k=document.getElementById('dbKey').value.trim();
    if(!k){alert('Enter a portal key.');return;}
    const t=document.getElementById('dbTemplate').value;
    const sb2=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
    let seedData=null;
    if(t==='vista')seedData=JSON.parse(JSON.stringify(demoVista));
    else if(t==='99')seedData=JSON.parse(JSON.stringify(demo99));
    if(seedData){
      seedData._id=seedData._id||('p'+Date.now());
      await sb2.from('portals').upsert({key:k,data:seedData,updated_at:new Date().toISOString()},{onConflict:'key'});
    }
    window.open(BASE_PORTAL+'?p='+encodeURIComponent(k),'_blank');
    dbCloseModal();setTimeout(dbLoad,2000);
  }
  dbLoad();

} else if(!PROJECT_KEY) {
  // No ?p= key and not dashboard — redirect to dashboard automatically
  window.location.replace(window.location.pathname + '?dashboard');
} else {
  // Show loading until Supabase data arrives — never render with empty state
  document.getElementById('app').innerHTML = '<div style="padding:3rem 1.5rem;text-align:center;color:var(--ink-faint);font-size:13px">Loading portal…</div>';
  updateSyncPill();
  initSync();
}
</script>
